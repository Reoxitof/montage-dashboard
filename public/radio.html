<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio VAD — Reoxitof NUI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════
   RADIO VAD — NUI Control Panel
   Voice Activity Detection
   ═══════════════════════════════════════ */

:root {
  --nui-void:        #05010d;
  --nui-abyss:       #0a0118;
  --nui-deep:        #110222;
  --nui-surface:     #1a0533;
  --nui-elevated:    #220844;
  --nui-violet-dim:  #6b21a8;
  --nui-violet:      #8b5cf6;
  --nui-violet-bright: #a78bfa;
  --nui-violet-glow: #c4b5fd;
  --nui-accent:      #d946ef;
  --nui-accent-glow: #e879f9;
  --nui-white:       #f0e6ff;
  --nui-white-pure:  #ffffff;
  --nui-gold:        #fbbf24;
  --nui-cyan:        #22d3ee;
  --nui-red:         #f43f5e;
  --nui-green:       #34d399;
  --nui-border:      rgba(139, 92, 246, 0.35);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(107, 33, 168, 0.15), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(217, 70, 239, 0.08), transparent 50%),
    linear-gradient(180deg, var(--nui-void) 0%, var(--nui-abyss) 50%, var(--nui-void) 100%);
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  color: var(--nui-white);
  -webkit-font-smoothing: antialiased;
}

/* ── Main Panel ── */

.radio-panel {
  width: 480px;
  padding: 36px 40px;
  position: relative;

  background:
    linear-gradient(135deg,
      rgba(10, 1, 24, 0.97) 0%,
      rgba(17, 2, 34, 0.95) 50%,
      rgba(10, 1, 24, 0.97) 100%
    );
  backdrop-filter: blur(20px) saturate(1.4);

  border: 1.5px solid var(--nui-border);
  clip-path: polygon(
    20px 0%, calc(100% - 20px) 0%,
    100% 20px, 100% calc(100% - 20px),
    calc(100% - 20px) 100%, 20px 100%,
    0% calc(100% - 20px), 0% 20px
  );

  box-shadow:
    0 0 40px rgba(139, 92, 246, 0.3),
    0 0 80px rgba(139, 92, 246, 0.12),
    0 0 120px rgba(139, 92, 246, 0.06);

  animation: panelEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.radio-panel::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 15%;
  right: 15%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--nui-violet) 20%, var(--nui-accent) 50%, var(--nui-violet) 80%, transparent);
  animation: lineGlow 3s ease-in-out infinite;
}

.radio-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(139, 92, 246, 0.04) 0%, transparent 30%);
  pointer-events: none;
  clip-path: inherit;
}

/* ── Header ── */

.panel-header {
  text-align: center;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}

.panel-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--nui-violet-dim), var(--nui-surface));
  border: 2px solid var(--nui-border);
  box-shadow: 0 0 25px rgba(139, 92, 246, 0.35);
  font-size: 26px;
  color: var(--nui-violet-glow);
  margin-bottom: 16px;
  transition: all 0.4s ease;
}

.panel-icon.active {
  color: var(--nui-green);
  border-color: rgba(52, 211, 153, 0.5);
  box-shadow: 0 0 25px rgba(52, 211, 153, 0.35), 0 0 50px rgba(52, 211, 153, 0.15);
  animation: iconPulse 1.2s ease-in-out infinite;
}

.panel-icon.speaking {
  color: var(--nui-cyan);
  border-color: rgba(34, 211, 238, 0.6);
  box-shadow: 0 0 30px rgba(34, 211, 238, 0.45), 0 0 60px rgba(34, 211, 238, 0.2);
  animation: iconPulse 0.6s ease-in-out infinite;
}

.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
}

.panel-subtitle {
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: rgba(167, 139, 250, 0.6);
  margin-top: 4px;
}

/* ── Separator ── */

.separator {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--nui-border), transparent);
  margin: 20px 0;
}

/* ── Status ── */

.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  position: relative;
  z-index: 1;
}

.status-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  color: rgba(167, 139, 250, 0.7);
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-label i {
  font-size: 12px;
  width: 16px;
  text-align: center;
}

.status-value {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
}

.status-value.off { color: rgba(167, 139, 250, 0.4); }
.status-value.on { color: var(--nui-green); text-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }
.status-value.speaking { color: var(--nui-cyan); text-shadow: 0 0 8px rgba(34, 211, 238, 0.5); }
.status-value.error { color: var(--nui-red); text-shadow: 0 0 8px rgba(244, 63, 94, 0.5); }

/* ── Volume Meter ── */

.meter-section {
  margin: 20px 0;
  position: relative;
  z-index: 1;
}

.meter-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  color: rgba(167, 139, 250, 0.6);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.meter-db {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  color: var(--nui-violet-bright);
}

.meter-track {
  width: 100%;
  height: 10px;
  background: rgba(26, 5, 51, 0.8);
  border-radius: 50px;
  overflow: hidden;
  border: 1px solid rgba(139, 92, 246, 0.15);
  position: relative;
}

.meter-fill {
  height: 100%;
  width: 0%;
  border-radius: 50px;
  background: linear-gradient(90deg,
    var(--nui-violet-dim),
    var(--nui-violet),
    var(--nui-green)
  );
  box-shadow: 0 0 8px rgba(139, 92, 246, 0.4);
  transition: width 0.08s linear;
}

.meter-fill.hot {
  background: linear-gradient(90deg,
    var(--nui-violet),
    var(--nui-cyan),
    var(--nui-green)
  );
  box-shadow: 0 0 12px rgba(34, 211, 238, 0.5);
}

/* Threshold marker */
.meter-threshold {
  position: absolute;
  top: -3px;
  bottom: -3px;
  width: 2px;
  background: var(--nui-red);
  box-shadow: 0 0 6px rgba(244, 63, 94, 0.6);
  border-radius: 2px;
  z-index: 2;
  transition: left 0.3s ease;
}

.meter-threshold::after {
  content: 'SEUIL';
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--nui-red);
  white-space: nowrap;
}

/* ── Slider ── */

.slider-section {
  margin: 16px 0;
  position: relative;
  z-index: 1;
}

.slider-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.slider-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  color: rgba(167, 139, 250, 0.6);
}

.slider-value {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  color: var(--nui-violet-bright);
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  background: rgba(26, 5, 51, 0.8);
  border-radius: 50px;
  border: 1px solid rgba(139, 92, 246, 0.15);
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--nui-violet), var(--nui-accent));
  border: 2px solid var(--nui-violet-glow);
  box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
  cursor: pointer;
  transition: box-shadow 0.2s ease;
}

input[type="range"]::-webkit-slider-thumb:hover {
  box-shadow: 0 0 16px rgba(139, 92, 246, 0.7);
}

/* ── Button ── */

.btn-start {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 24px;
  position: relative;
  z-index: 1;

  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--nui-white);
  cursor: pointer;

  background: linear-gradient(135deg, var(--nui-violet-dim), var(--nui-elevated));
  border: 1.5px solid var(--nui-border);
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(139, 92, 246, 0.25);
  transition: all 0.3s ease;
}

.btn-start:hover {
  background: linear-gradient(135deg, var(--nui-violet), var(--nui-violet-dim));
  box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
  border-color: rgba(139, 92, 246, 0.6);
}

.btn-start:active {
  transform: scale(0.98);
}

.btn-start.active {
  background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(34, 8, 68, 0.6));
  border-color: rgba(52, 211, 153, 0.4);
  color: var(--nui-green);
  box-shadow: 0 0 20px rgba(52, 211, 153, 0.25);
}

/* ── Log ── */

.log-section {
  margin-top: 20px;
  position: relative;
  z-index: 1;
}

.log-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  color: rgba(167, 139, 250, 0.4);
  margin-bottom: 8px;
}

.log-box {
  max-height: 100px;
  overflow-y: auto;
  padding: 10px 14px;
  background: rgba(5, 1, 13, 0.6);
  border: 1px solid rgba(139, 92, 246, 0.1);
  border-radius: 8px;
  font-family: 'Exo 2', monospace;
  font-size: 11px;
  line-height: 1.6;
  color: rgba(167, 139, 250, 0.5);
}

.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-track { background: transparent; }
.log-box::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 4px; }

.log-entry.info { color: rgba(167, 139, 250, 0.6); }
.log-entry.success { color: var(--nui-green); }
.log-entry.warn { color: var(--nui-gold); }
.log-entry.error { color: var(--nui-red); }
.log-entry.radio-on { color: var(--nui-cyan); }
.log-entry.radio-off { color: rgba(167, 139, 250, 0.4); }

/* ── Animations ── */

@keyframes panelEnter {
  0% { transform: translateY(30px) scale(0.95); opacity: 0; filter: blur(8px); }
  100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
}

@keyframes lineGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
</style>
</head>

<body>

<div class="radio-panel">

  <!-- Header -->
  <div class="panel-header">
    <div class="panel-icon" id="panelIcon">
      <i class="fa-solid fa-microphone"></i>
    </div>
    <div class="panel-title">RADIO VAD</div>
    <div class="panel-subtitle">Détection vocale automatique</div>
  </div>

  <div class="separator"></div>

  <!-- Status -->
  <div class="status-row">
    <div class="status-label"><i class="fa-solid fa-microphone"></i> MICRO</div>
    <div class="status-value off" id="micStatus">INACTIF</div>
  </div>

  <div class="status-row">
    <div class="status-label"><i class="fa-solid fa-tower-broadcast"></i> RADIO</div>
    <div class="status-value off" id="radioStatus">OFF</div>
  </div>

  <div class="status-row">
    <div class="status-label"><i class="fa-solid fa-server"></i> SERVEUR</div>
    <div class="status-value off" id="serverStatus">—</div>
  </div>

  <div class="separator"></div>

  <!-- Volume Meter -->
  <div class="meter-section">
    <div class="meter-label">
      <span><i class="fa-solid fa-wave-square"></i> NIVEAU AUDIO</span>
      <span class="meter-db" id="dbDisplay">-∞ dB</span>
    </div>
    <div class="meter-track">
      <div class="meter-fill" id="meterFill"></div>
      <div class="meter-threshold" id="meterThreshold" style="left: 30%"></div>
    </div>
  </div>

  <!-- Threshold Slider -->
  <div class="slider-section">
    <div class="slider-header">
      <span class="slider-label"><i class="fa-solid fa-sliders"></i> SEUIL DE DÉTECTION</span>
      <span class="slider-value" id="thresholdDisplay">30%</span>
    </div>
    <input type="range" id="thresholdSlider" min="5" max="80" value="30">
  </div>

  <!-- Delay Slider -->
  <div class="slider-section">
    <div class="slider-header">
      <span class="slider-label"><i class="fa-solid fa-clock"></i> DÉLAI COUPURE (ms)</span>
      <span class="slider-value" id="delayDisplay">400ms</span>
    </div>
    <input type="range" id="delaySlider" min="100" max="2000" value="400" step="50">
  </div>

  <div class="separator"></div>

  <!-- Start Button -->
  <button class="btn-start" id="btnStart">
    <i class="fa-solid fa-play"></i> DÉMARRER LA DÉTECTION
  </button>

  <!-- Log -->
  <div class="log-section">
    <div class="log-title"><i class="fa-solid fa-terminal"></i> JOURNAL</div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   RADIO VAD — Voice Activity Detection
   Détecte l'activité micro et envoie radio ON/OFF au serveur
   ═══════════════════════════════════════════════════════════════ */

// ── Elements ──
const panelIcon     = document.getElementById("panelIcon");
const micStatus     = document.getElementById("micStatus");
const radioStatusEl = document.getElementById("radioStatus");
const serverStatus  = document.getElementById("serverStatus");
const dbDisplay     = document.getElementById("dbDisplay");
const meterFill     = document.getElementById("meterFill");
const meterThreshold = document.getElementById("meterThreshold");
const thresholdSlider = document.getElementById("thresholdSlider");
const thresholdDisplay = document.getElementById("thresholdDisplay");
const delaySlider   = document.getElementById("delaySlider");
const delayDisplay  = document.getElementById("delayDisplay");
const btnStart      = document.getElementById("btnStart");
const logBox        = document.getElementById("logBox");

// ── State ──
let isRunning     = false;
let audioContext   = null;
let analyser       = null;
let microphone     = null;
let stream         = null;
let animFrame      = null;

let radioIsOn      = false;
let silenceTimer   = null;
let threshold      = 30;   // % du volume
let silenceDelay   = 400;  // ms avant de couper

let serverUrl      = "";

// ── Logging ──
function log(msg, cls = "info") {
  const time = new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  const entry = document.createElement("div");
  entry.className = "log-entry " + cls;
  entry.textContent = `[${time}] ${msg}`;
  logBox.appendChild(entry);
  logBox.scrollTop = logBox.scrollHeight;

  // Garder max 50 lignes
  while (logBox.children.length > 50) {
    logBox.removeChild(logBox.firstChild);
  }
}

// ── Server URL ──
async function loadServerUrl() {
  try {
    const res = await fetch("/config", { cache: "no-store" });
    const config = await res.json();
    serverUrl = config.publicUrl || window.location.origin;
    serverStatus.textContent = "CONNECTÉ";
    serverStatus.className = "status-value on";
    log("Serveur : " + serverUrl, "success");
  } catch (e) {
    serverUrl = window.location.origin;
    serverStatus.textContent = "FALLBACK";
    serverStatus.className = "status-value warn";
    log("Config indisponible, fallback sur origin", "warn");
  }
}

// ── Radio Control ──
async function setRadio(on) {
  if (on === radioIsOn) return;
  radioIsOn = on;

  const endpoint = on ? "/radio/on" : "/radio/off";

  try {
    await fetch(serverUrl + endpoint, { cache: "no-store" });

    radioStatusEl.textContent = on ? "ON" : "OFF";
    radioStatusEl.className = "status-value " + (on ? "speaking" : "off");

    panelIcon.className = "panel-icon " + (on ? "speaking" : "active");

    log(on ? "📡 Radio ON — Parole détectée" : "📡 Radio OFF — Silence", on ? "radio-on" : "radio-off");
  } catch (e) {
    log("Erreur envoi radio : " + e.message, "error");
  }
}

// ── Audio Analysis ──
function processAudio() {
  if (!analyser || !isRunning) return;

  const dataArray = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(dataArray);

  // Calculer le RMS (Root Mean Square) du signal
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }
  const rms = Math.sqrt(sum / dataArray.length);
  const volumePercent = Math.min(100, Math.round(rms * 400));

  // dB
  const db = rms > 0 ? Math.round(20 * Math.log10(rms)) : -Infinity;
  dbDisplay.textContent = db > -100 ? db + " dB" : "-∞ dB";

  // Meter
  meterFill.style.width = volumePercent + "%";
  meterFill.className = "meter-fill" + (volumePercent >= threshold ? " hot" : "");

  // Voice Activity Detection
  if (volumePercent >= threshold) {
    // Parole détectée
    if (silenceTimer) {
      clearTimeout(silenceTimer);
      silenceTimer = null;
    }
    setRadio(true);
  } else {
    // Silence — attendre le délai avant de couper
    if (radioIsOn && !silenceTimer) {
      silenceTimer = setTimeout(() => {
        setRadio(false);
        silenceTimer = null;
      }, silenceDelay);
    }
  }

  animFrame = requestAnimationFrame(processAudio);
}

// ── Start / Stop ──
async function startVAD() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.3;

    microphone = audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);

    isRunning = true;
    processAudio();

    micStatus.textContent = "ACTIF";
    micStatus.className = "status-value on";
    panelIcon.className = "panel-icon active";

    btnStart.innerHTML = '<i class="fa-solid fa-stop"></i> ARRÊTER LA DÉTECTION';
    btnStart.classList.add("active");

    log("Micro activé — Détection en cours", "success");

  } catch (e) {
    log("Erreur micro : " + e.message, "error");
    micStatus.textContent = "ERREUR";
    micStatus.className = "status-value error";
  }
}

function stopVAD() {
  isRunning = false;

  if (animFrame) cancelAnimationFrame(animFrame);
  if (silenceTimer) clearTimeout(silenceTimer);
  if (microphone) microphone.disconnect();
  if (audioContext) audioContext.close();
  if (stream) stream.getTracks().forEach(t => t.stop());

  audioContext = null;
  analyser = null;
  microphone = null;
  stream = null;
  animFrame = null;
  silenceTimer = null;

  // Reset radio
  if (radioIsOn) setRadio(false);

  meterFill.style.width = "0%";
  dbDisplay.textContent = "-∞ dB";

  micStatus.textContent = "INACTIF";
  micStatus.className = "status-value off";
  radioStatusEl.textContent = "OFF";
  radioStatusEl.className = "status-value off";
  panelIcon.className = "panel-icon";

  btnStart.innerHTML = '<i class="fa-solid fa-play"></i> DÉMARRER LA DÉTECTION';
  btnStart.classList.remove("active");

  log("Détection arrêtée", "warn");
}

// ── Events ──

btnStart.addEventListener("click", () => {
  if (isRunning) {
    stopVAD();
  } else {
    startVAD();
  }
});

thresholdSlider.addEventListener("input", (e) => {
  threshold = parseInt(e.target.value);
  thresholdDisplay.textContent = threshold + "%";
  meterThreshold.style.left = threshold + "%";
});

delaySlider.addEventListener("input", (e) => {
  silenceDelay = parseInt(e.target.value);
  delayDisplay.textContent = silenceDelay + "ms";
});

// ── Init ──
loadServerUrl();
log("Radio VAD prêt — Cliquez sur Démarrer", "info");
</script>

</body>
</html>
